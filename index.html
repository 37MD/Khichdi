<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indian Daily Dash (Text-Only Portrait)</title>
<style>
  /* Base styling ensuring strictly black fonts only */
  body {
    font-family: 'Roboto', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #d6c9b3;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0,0,0,0.015) 1px, rgba(0,0,0,0.015) 2px);
    margin: 0;
    padding: 0;
    color: #000000;
    display: flex;
    justify-content: center;
  }
  
  h1, h2, h3, h4, p, a, span, div, li, ul, strong, button, input {
    color: #000000 !important;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }

  .mobile-container {
    width: 100%;
    max-width: 960px; 
    background-color: #faf3e0;
    min-height: 100vh;
    box-shadow: 0 4px 15px rgba(0,0,0,0.6);
    padding: 15px;
    box-sizing: border-box;
    overflow-x: hidden;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
    padding: 15px 10px;
    border: 2px solid #000000;
    background-color: #4a6fa5;
  }

  #lang-select {
    background-color: #e9c46a;
    border: 2px solid #000000;
    padding: 6px 8px;
    font-weight: bold;
    font-size: 0.9em;
    cursor: pointer;
  }

  .reset-small-btn {
    background-color: #d4a373;
    border: 2px solid #000000;
    padding: 8px 12px;
    font-weight: bold;
    cursor: pointer;
    font-size: 0.8em;
    white-space: nowrap;
    margin-left: auto;
    align-self: center;
  }

  .reset-small-btn:hover {
    background-color: #c4956a;
  }

  .header h1 {
    margin: 0;
    font-size: 1.8em; 
    line-height: 1.2;
  }

  .category-title {
    background-color: #e07a5f;
    padding: 12px;
    border: 3px solid #000000;
    margin-top: 35px;
    margin-bottom: 20px;
    text-align: center;
    font-size: 1.5em;
    font-weight: bold;
    text-transform: uppercase;
  }

  #section-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 25px;
  }

  .section-btn {
    flex: 1;
    min-width: 100px;
    padding: 14px 10px;
    border: 3px solid #000000;
    text-align: center;
    font-size: 1.1em;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    user-select: none;
  }

  .section-btn:hover {
    filter: brightness(0.9);
  }

  .section-btn.active {
    filter: brightness(0.8);
    border-width: 4px;
  }

  .section-content {
    display: none;
  }

  .section-content.open {
    display: block;
  }

  #saved-section {
    background-color: #e9c46a;
    border: 3px dashed #000000;
    padding: 15px;
    margin-bottom: 30px;
  }
  
  #saved-section .category-title {
    margin-top: 0;
    background-color: #d4a373;
  }

  .feed-section {
    margin-bottom: 40px;
  }

  .feed-section h2 {
    border-bottom: 3px solid #000000;
    padding-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 1.2em;
    display: flex;
    flex-direction: column; 
    align-items: flex-start;
    gap: 8px;
  }

  .language-tag {
    font-size: 0.75em;
    background-color: #a8dadc;
    padding: 4px 8px;
    border: 1px solid #000000;
    font-weight: bold;
    align-self: flex-start;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr; 
    gap: 20px;
    margin-top: 15px;
  }

  .card {
    background-color: #f4f1de;
    border: 2px solid #000000;
    padding: 12px;
    display: flex;
    flex-direction: row;
    gap: 10px;
  }

  .card-body {
    flex: 4;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .insight-card {
    background-color: #e0e1dd;
    border: 3px solid #000000;
    padding: 18px 15px;
    display: flex;
    flex-direction: column;
  }

  .insight-card h3 {
    text-transform: uppercase;
    border-bottom: 1px solid #000000;
    padding-bottom: 5px;
    font-size: 1.2em;
    margin-top: 0;
  }

  .insight-card p {
    font-size: 1.1em;
    line-height: 1.6;
    margin-bottom: 0;
  }

  .card-body h3 {
    margin: 0 0 8px 0;
    font-size: 1.4em;
    line-height: 1.3;
    border-bottom: 1px solid #000000;
    padding-bottom: 6px;
  }

  .card-body p {
    font-size: 1.15em;
    line-height: 1.7;
    flex-grow: 1;
    margin: 0;
  }

  .card-actions {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 6px;
    min-width: 80px;
  }

  .btn-sm {
    width: 100%;
    text-align: center;
    font-weight: bold;
    border: 2px solid #000000;
    padding: 8px 3px;
    background-color: #d4a373;
    font-size: 0.7em;
    cursor: pointer;
    text-decoration: none;
    color: #000000 !important;
    box-sizing: border-box;
  }

  .btn-sm:hover {
    background-color: #c4956a;
  }

  .read-original {
    display: block;
    text-align: center;
    margin-top: 10px;
    text-decoration: none;
    font-weight: bold;
    border: 2px solid #000000;
    padding: 12px 15px; 
    background-color: #a8dadc;
    font-size: 1em;
    transition: background-color 0.2s;
  }

  .read-original:hover {
    background-color: #8ecae6;
  }

  .loading {
    font-weight: bold;
    font-size: 1em;
    text-align: center;
    padding: 20px 0;
  }

  /* Search & Interactive Tools Input Styling */
  .search-input {
    padding: 12px;
    border: 2px solid #000000;
    font-weight: bold;
    width: 100%;
    box-sizing: border-box;
    margin-bottom: 15px;
    background-color: #f4f1de;
    font-size: 1.1em;
  }
  
  .search-buttons {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .goog-te-banner-frame, .goog-te-menu-frame, .goog-te-gadget-icon {
    display: none !important;
  }

  body > .skiptranslate {
    display: none !important;
  }

  .goog-te-gadget {
    height: 0 !important;
    overflow: hidden !important;
    font-size: 0 !important;
  }
</style>
<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</head>
<body>

<div class="mobile-container">
  
  <div class="header">
    <h1>Khichdi v1A</h1>
    <div id="google_translate_element"></div>
    <select id="lang-select">
      <option value="marathi">Marathi</option>
      <option value="hindi">Hindi</option>
      <option value="english">English</option>
    </select>
  </div>

  <div id="section-buttons"></div>

  <!-- SAVED ARTICLES SECTION -->
  <div id="saved-section" style="display: none;">
    <div class="category-title">&#128206; Saved</div>
    <div class="grid" id="saved-grid"></div>
  </div>

  <!-- MAIN FEED CONTAINER -->
  <div id="feed-container"></div>

</div>

<script>
  // ==========================================
  // TRAVEL DISCOVERY LOGIC
  // ==========================================
  function searchTravel(type) {
    const query = document.getElementById('travel-search-input').value.trim();
    if (!query) {
      alert("Please enter a destination name first.");
      return;
    }
    
    // Add "India" to the search term to ensure relevant results
    const encodedQuery = encodeURIComponent(query + " tourism India");
    let url = "";
    
    if (type === 'photos') {
      // Direct link to Google Images
      url = "https://www.google.com/search?tbm=isch&q=" + encodedQuery;
    } else if (type === 'youtube') {
      // Direct link to YouTube Video Search for Travel Vlogs
      url = "https://www.youtube.com/results?search_query=" + encodedQuery + "+travel+vlog";
    }
    
    window.open(url, '_blank');
  }

  // ==========================================
  // SHOPPING & PRICE TRACKER LOGIC
  // ==========================================
  function checkPriceHistory() {
    const url = document.getElementById('price-tracker-input').value.trim();
    if (!url) {
      alert("Please paste a product link first.");
      return;
    }
    
    // Route Amazon links to CamelCamelCamel India for direct graph loading
    if (url.toLowerCase().includes('amazon.in')) {
       window.open("https://in.camelcamelcamel.com/search?sq=" + encodeURIComponent(url), '_blank');
    } 
    // Route Flipkart, Myntra, and others to PriceHistoryApp
    else {
       alert("Redirecting to PriceHistoryApp. Paste your link in their search bar to view the graph.");
       window.open("https://pricehistoryapp.com/", '_blank');
    }
  }

  function searchPortal(portal) {
    const query = document.getElementById('shop-search-input').value.trim();
    if (!query) {
      alert("Please enter a product name first.");
      return;
    }
    
    let url = "";
    const encodedQuery = encodeURIComponent(query);
    
    if (portal === 'amazon') {
      url = "https://www.amazon.in/s?k=" + encodedQuery;
    } else if (portal === 'flipkart') {
      url = "https://www.flipkart.com/search?q=" + encodedQuery;
    } else if (portal === 'myntra') {
      url = "https://www.myntra.com/" + encodedQuery;
    }
    
    window.open(url, '_blank');
  }

  // ==========================================
  // STATE MANAGEMENT (LOCAL STORAGE)
  // ==========================================
  let readArticles = JSON.parse(localStorage.getItem('readArticles')) || [];
  let savedArticles = JSON.parse(localStorage.getItem('savedArticles')) || [];

  function markAsRead(link) {
    if (!readArticles.includes(link)) {
      readArticles.push(link);
      localStorage.setItem('readArticles', JSON.stringify(readArticles));
    }
    const cardElement = document.querySelector(`.card[data-link="${link}"]`);
    if (cardElement) {
      cardElement.style.display = 'none';
    }
  }

  function saveArticle(articleDataStr) {
    const article = JSON.parse(decodeURIComponent(articleDataStr));
    if (!savedArticles.find(a => a.link === article.link)) {
      savedArticles.push(article);
      localStorage.setItem('savedArticles', JSON.stringify(savedArticles));
    }
    markAsRead(article.link);
    renderSavedSection();
  }

  function unsaveArticle(link) {
    savedArticles = savedArticles.filter(a => a.link !== link);
    localStorage.setItem('savedArticles', JSON.stringify(savedArticles));
    renderSavedSection();
  }

  function resetHistory() {
    if (confirm("This will un-hide all previously read articles. Continue?")) {
      localStorage.removeItem('readArticles');
      location.reload();
    }
  }

  // ==========================================
  // RENDER SAVED ARTICLES UI (TEXT ONLY)
  // ==========================================
  function renderSavedSection() {
    const savedSection = document.getElementById('saved-section');
    const savedGrid = document.getElementById('saved-grid');
    savedGrid.innerHTML = '';

    if (savedArticles.length === 0) {
      savedSection.style.display = 'none';
      return;
    }

    savedSection.style.display = 'block';

    savedArticles.forEach(article => {
      const card = document.createElement('div');
      card.className = 'card';
      
      card.innerHTML = `
        <div class="card-body">
          <h3>${article.title}</h3>
          <p>${article.summary}</p>
        </div>
        <div class="card-actions">
          <a href="${getTranslatedLink(article.link, false)}" target="_blank" class="btn-sm read-original" data-link="${article.link}">${article.buttonText}</a>
          <button class="btn-sm btn-unsave" data-link="${article.link}">Remove</button>
        </div>
      `;
      savedGrid.appendChild(card);
    });
  }

  document.addEventListener('click', (e) => {
    if (e.target.matches('.read-original')) {
       markAsRead(e.target.getAttribute('data-link'));
    }
    if (e.target.matches('.btn-dismiss')) {
       markAsRead(e.target.getAttribute('data-link'));
    }
    if (e.target.matches('.btn-save')) {
       saveArticle(e.target.getAttribute('data-article'));
    }
    if (e.target.matches('.btn-unsave')) {
       unsaveArticle(e.target.getAttribute('data-link'));
    }
  });

  renderSavedSection();

  // ==========================================
  // CONTENT & FEED GENERATION
  // ==========================================

  const wellnessTips = [
    "Taking a 10-15 minute walk immediately after meals helps your muscles absorb energy directly, naturally blunting post-meal blood sugar spikes.",
    "Starting your meals with a portion of fiber-rich greens before eating carbohydrates slows digestion and prevents sudden spikes in energy levels.",
    "Adding a pinch of cinnamon to your morning tea or oatmeal not only enhances flavor but has been scientifically shown to support healthy metabolic function and insulin sensitivity.",
    "Staying well-hydrated helps your body naturally flush out excess sugars through the kidneys. Aim to drink a glass of water an hour before heavy meals.",
    "Incorporating strength-based Yoga poses (like the Plank or Warrior series) builds muscle tone, which acts as a natural reservoir to safely store and manage blood glucose.",
    "Consuming a small spoonful of apple cider vinegar diluted in water before a carbohydrate-heavy meal can improve insulin response and lower post-meal glucose."
  ];

  const womensWellnessTips = [
    "Bone Vitality: As natural hormonal shifts occur, maintaining bone density is crucial. Ensure adequate daily Calcium and Vitamin D intake, and include weight-bearing exercises like brisk walking.",
    "Heart Protection: Hormonal changes can influence cardiovascular health. Incorporate Omega-3 rich foods like flaxseeds, walnuts, or fatty fish into your daily meals to support a strong heart.",
    "Strength & Mobility: Maintaining muscle tone is vital for long-term mobility and metabolic health. Light strength training or resistance band workouts twice a week do wonders for your overall energy.",
    "Joint Flexibility: Gentle daily stretching or restorative Yoga helps maintain joint lubrication and flexibility, easing morning stiffness and keeping you active throughout the day.",
    "Energy Distribution: To optimize your daily energy levels, try to spread your protein intake evenly across breakfast, lunch, and dinner rather than having it all in one heavy meal.",
    "Restorative Sleep: Natural hormonal shifts can sometimes disrupt sleep architecture. Maintaining a consistent, cool, and dark sleeping environment supports healthy stress levels and overall immunity."
  ];

  function getRandomTip(array) {
    const randomIndex = Math.floor(Math.random() * array.length);
    return array[randomIndex];
  }

  // Complete array of all sections including the new Travel News section
  const mainSections = [
    {
      title: "Travel",
      categories: [
        {
          title: "Travel & Tourism (India)",
          injectTip: false,
          feeds: [
            { name: "Top Destinations", language: "English", url: "https://news.google.com/rss/search?q=places+to+visit+in+India+tourism&hl=en-IN&gl=IN&ceid=IN:en" },
            { name: "Incredible India News", language: "English", url: "https://news.google.com/rss/search?q=Indian+tourism+travel+news&hl=en-IN&gl=IN&ceid=IN:en" }
          ]
        }
      ]
    },
    {
      title: "Shopping",
      categories: [
        {
          title: "Shopping & Offers News",
          injectTip: false,
          feeds: [
            { name: "Sale & Festival Offers", language: "English", url: "https://news.google.com/rss/search?q=Amazon+OR+Flipkart+OR+Myntra+sale+offers+India&hl=en-IN&gl=IN&ceid=IN:en" },
            { name: "Price Drop Alerts", language: "English", url: "https://news.google.com/rss/search?q=price+drop+smartphones+gadgets+India&hl=en-IN&gl=IN&ceid=IN:en" }
          ]
        }
      ]
    },
    {
      title: "News",
      categories: [
        {
          title: "Top News (Shorts)",
          injectTip: false,
          feeds: [
            { name: "NDTV (National)", language: "English", url: "https://feeds.feedburner.com/ndtvnews-top-stories" },
            { name: "Zee News (National)", language: "Hindi", url: "https://zeenews.india.com/hindi/india.xml" },
            { name: "News18 (Tech)", language: "English", url: "https://www.news18.com/rss/tech.xml" }
          ]
        },
        {
          title: "Marathi News (ताज्या बातम्या)",
          injectTip: false,
          feeds: [
            { name: "News18 Marathi", language: "Marathi", url: "https://news18marathi.com/rss/" },
            { name: "ABP Majha", language: "Marathi", url: "https://marathi.abplive.com/home/feed" }
          ]
        }
      ]
    },
    {
      title: "Lifestyle & Wellness",
      categories: [
        {
          title: "Kitchen & Household",
          injectTip: false,
          feeds: [
            { name: "Kabita's Kitchen (YT)", language: "Hindi", url: "https://www.youtube.com/feeds/videos.xml?channel_id=UCChxc2TjcTpeH5Lnjj55tKQ", isYoutube: true },
            { name: "MadhurasRecipe (YT)", language: "Marathi", url: "https://www.youtube.com/feeds/videos.xml?channel_id=UCQG_jzCQpsIVPG02_iXjB0g", isYoutube: true },
            { name: "Swasthi's Recipes", language: "English", url: "https://www.indianhealthyrecipes.com/feed/" }
          ]
        },
        {
          title: "Health & Yoga",
          injectTip: true,
          feeds: [
            { name: "Times of India - Health", language: "English", url: "https://timesofindia.indiatimes.com/rssfeeds/2886704.cms" },
            { name: "Fit Tuber (YT)", language: "Hindi", url: "https://www.youtube.com/feeds/videos.xml?channel_id=UCYC6VEEqE-5r0O-A8N6zB3g", isYoutube: true }
          ]
        },
        {
          title: "Stories & Articles",
          injectTip: false,
          feeds: [
            { name: "Hindi Sahitya Darpan", language: "Hindi", url: "https://www.hindisahityadarpan.in/feeds/posts/default?alt=rss" },
            { name: "Maharashtra Times", language: "Marathi", url: "https://maharashtratimes.com/rssfeeds/4836692.cms" }
          ]
        }
      ]
    }
  ];

  const container = document.getElementById('feed-container');
  const rss2jsonUrl = 'https://api.rss2json.com/v1/api.json?rss_url=';

  function renderSectionContent(sectionEl, section) {
    section.categories.forEach(cat => {
      const catHeader = document.createElement('div');
      catHeader.className = 'category-title';
      catHeader.innerText = cat.title;
      sectionEl.appendChild(catHeader);

      if (cat.injectTip) {
        const tipSection = document.createElement('div');
        tipSection.className = 'feed-section';
        const dailyMetabolicTip = getRandomTip(wellnessTips);
        const dailyWomensTip = getRandomTip(womensWellnessTips);
        
        tipSection.innerHTML = `
          <div class="grid">
            <div class="insight-card">
              <h3>&#10024; Daily Metabolic Insight</h3>
              <p><strong>Did you know?</strong> ${dailyMetabolicTip}</p>
            </div>
            <div class="insight-card">
              <h3>&#127804; Women's Wellness Focus</h3>
              <p><strong>Vital Tip:</strong> ${dailyWomensTip}</p>
            </div>
          </div>
        `;
        sectionEl.appendChild(tipSection);
      }

      cat.feeds.forEach(feed => {
        const feedSection = document.createElement('div');
        feedSection.className = 'feed-section';
        
        const safeId = `grid-${feed.name.replace(/[^a-zA-Z0-9]/g, '')}`;
        
        feedSection.innerHTML = `
          <h2>
            ${feed.name} 
            <span class="language-tag">${feed.language}</span>
          </h2>
          <div class="grid" id="${safeId}">
            <p class="loading">Loading latest content...</p>
          </div>
        `;
        
        sectionEl.appendChild(feedSection);
        const grid = document.getElementById(safeId);

        fetch(rss2jsonUrl + encodeURIComponent(feed.url))
          .then(response => response.json())
          .then(data => {
            grid.innerHTML = ''; 

            if (data.status !== 'ok') {
              grid.innerHTML = '<p>Failed to load feed. The publisher may have restricted access.</p>';
              return;
            }

            const unreadItems = data.items.filter(item => !readArticles.includes(item.link));
            const itemsToDisplay = unreadItems.slice(0, 6);

            if(itemsToDisplay.length === 0) {
               grid.innerHTML = '<p>You are all caught up! No new articles right now.</p>';
               return;
            }

            itemsToDisplay.forEach(item => {
              const card = document.createElement('div');
              card.className = 'card';
              card.setAttribute('data-link', item.link);

              let tempDiv = document.createElement("div");
              tempDiv.innerHTML = item.description;
              let cleanText = tempDiv.textContent || tempDiv.innerText || "";
              
              let wordsArray = cleanText.trim().split(/\s+/).filter(word => word.length > 0);
              let summary = "";
              
              if (wordsArray.length > 100) {
                summary = wordsArray.slice(0, 100).join(" ") + " ...";
              } else {
                summary = wordsArray.join(" ");
              }
              
              if (summary.trim() === "" || summary === "...") {
                 summary = "Tap below to view the full text or video directly from the source.";
              }

              let buttonText = feed.isYoutube ? "Open Original Video" : "Read Original Source";

              const articleData = {
                 title: item.title,
                 link: item.link,
                 summary: summary,
                 buttonText: buttonText
              };
              
              const safeArticleData = encodeURIComponent(JSON.stringify(articleData));

              card.innerHTML = `
                <div class="card-body">
                  <h3>${item.title}</h3>
                  <p>${summary}</p>
                </div>
                <div class="card-actions">
                  <button class="btn-sm btn-dismiss" data-link="${item.link}">Hide</button>
                  <button class="btn-sm btn-save" data-article="${safeArticleData}">Save</button>
                  <a href="${getTranslatedLink(item.link, feed.isYoutube)}" target="_blank" class="btn-sm read-original" data-link="${item.link}">${buttonText}</a>
                </div>
              `;
              grid.appendChild(card);
            });
          })
          .catch(error => {
            grid.innerHTML = '<p>Error fetching data. Check your network connection.</p>';
          });
      });
    });
  }

  function getTranslatedLink(link, isYoutube) {
    if (isYoutube) return link;
    const lang = document.getElementById('lang-select').value;
    const tl = lang === 'hindi' ? 'hi' : lang === 'marathi' ? 'mr' : 'en';
    return 'https://translate.google.com/translate?sl=auto&tl=' + tl + '&u=' + encodeURIComponent(link);
  }

  const btnContainer = document.getElementById('section-buttons');
  const sectionColors = ['#e07a5f', '#81b29a', '#3d5a80', '#9b5de5'];

  mainSections.forEach((section, index) => {
    const btn = document.createElement('button');
    btn.className = 'section-btn';
    btn.innerText = section.title;
    btn.style.backgroundColor = sectionColors[index];
    btnContainer.appendChild(btn);

    const sectionContent = document.createElement('div');
    sectionContent.className = 'section-content';
    sectionContent.id = 'sec-content-' + index;
    container.appendChild(sectionContent);

    let loaded = false;

    btn.addEventListener('click', function() {
      const allBtns = btnContainer.querySelectorAll('.section-btn');
      const allContents = container.querySelectorAll('.section-content');
      const isOpening = !sectionContent.classList.contains('open');

      allBtns.forEach(b => b.classList.remove('active'));
      allContents.forEach(c => c.classList.remove('open'));

      if (isOpening) {
        btn.classList.add('active');
        sectionContent.classList.add('open');
      }

      if (isOpening && !loaded) {
        loaded = true;
        renderSectionContent(sectionContent, section);
      }
    });
  });

  const resetBtn = document.createElement('button');
  resetBtn.className = 'reset-small-btn';
  resetBtn.innerHTML = '&#8634; Reset';
  resetBtn.addEventListener('click', resetHistory);
  btnContainer.appendChild(resetBtn);

  function googleTranslateElementInit() {
    new google.translate.TranslateElement({
      pageLanguage: 'en',
      includedLanguages: 'en,hi,mr'
    }, 'google_translate_element');

    setTimeout(function() {
      const combo = document.querySelector('.goog-te-combo');
      if (combo) {
        const match = document.cookie.match(/googtrans=\/en\/(\w+)/);
        combo.value = match ? match[1] : 'mr';
        combo.dispatchEvent(new Event('change'));
      }
    }, 1500);
  }

  document.getElementById('lang-select').addEventListener('change', function() {
    const val = this.value;
    const langMap = { english: 'en', hindi: 'hi', marathi: 'mr' };
    const tl = langMap[val];

    if (tl === 'en') {
      document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
    } else {
      document.cookie = 'googtrans=/en/' + tl + '; path=/;';
    }

    const gtCombo = document.querySelector('.goog-te-combo');
    if (gtCombo) {
      gtCombo.value = tl;
      gtCombo.dispatchEvent(new Event('change'));
    }
  });
</script>

</body>
</html>
